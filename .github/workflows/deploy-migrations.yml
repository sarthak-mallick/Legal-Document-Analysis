name: Deploy Migrations

# Mirrors Vercel's auto-deploy: when code lands on main, apply any pending
# Supabase migrations to the production database.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-migrations.yml"

# Avoid concurrent migration runs racing against the same database.
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Applies only migrations not yet recorded in the remote
      # supabase_migrations.schema_migrations table. The connection string
      # (incl. percent-encoded password) is stored as a single repo secret.
      - name: Push migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL"
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
